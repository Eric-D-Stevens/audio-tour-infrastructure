name: Deploy Infrastructure

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [lambda-changed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Set Lambda deployment parameters
      run: |
        if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
          echo "LAMBDA_IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_ENV
        else
          echo "LAMBDA_IMAGE_TAG=latest" >> $GITHUB_ENV
        fi

    - name: Deploy with CDK
      run: |
        npm run build
        npx cdk deploy --all --require-approval never
      env:
        LAMBDA_IMAGE_TAG: ${{ env.LAMBDA_IMAGE_TAG }}
